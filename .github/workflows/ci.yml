name: CI
on:
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: index.html が存在する
        run: test -f index.html

      - name: 必須セクションが揃っている
        run: |
          grep -q 'id="services"' index.html
          grep -q 'id="works"' index.html
          grep -q 'id="company"' index.html

      - name: HTML の基本構造が壊れていない
        run: |
          grep -q '<!DOCTYPE html>' index.html
          grep -q '</html>' index.html

      - run: echo "all checks passed"
